<!DOCTYPE html>
<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Voice Transcription Interface</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,typography"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet"/>
<script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        primary: "#D1F249", // Lime green from the screenshot
                        "background-light": "#F3F4F6",
                        "background-dark": "#0A0A0A", // Very dark background
                        "surface-dark": "#161616", // Slightly lighter for cards
                        "surface-light": "#FFFFFF",
                    },
                    fontFamily: {
                        display: ["Inter", "sans-serif"],
                    },
                    borderRadius: {
                        DEFAULT: "0.75rem",
                    },
                    boxShadow: {
                        'glow': '0 0 20px rgba(209, 242, 73, 0.3)',
                        'glow-intense': '0 0 40px rgba(209, 242, 73, 0.5)',
                    },
                    animation: {
                        'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                        'wave': 'wave 1.5s ease-in-out infinite',
                    },
                    keyframes: {
                        wave: {
                            '0%, 100%': { height: '10%' },
                            '50%': { height: '60%' },
                        }
                    }
                },
            },
        };
    </script>
<style>
        .voice-bar {
            width: 4px;
            background-color: #D1F249;
            border-radius: 9999px;
            animation: wave 1s ease-in-out infinite;
        }
        .voice-bar:nth-child(1) { animation-duration: 0.8s; height: 30%; }
        .voice-bar:nth-child(2) { animation-duration: 1.1s; height: 50%; }
        .voice-bar:nth-child(3) { animation-duration: 1.3s; height: 80%; }
        .voice-bar:nth-child(4) { animation-duration: 0.9s; height: 60%; }
        .voice-bar:nth-child(5) { animation-duration: 1.2s; height: 40%; }.hide-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-gray-900 dark:text-white h-screen overflow-hidden flex flex-col antialiased selection:bg-primary selection:text-black transition-colors duration-300">
<header class="pt-12 pb-4 px-6 flex justify-between items-center z-10 bg-gradient-to-b from-white dark:from-background-dark via-white dark:via-background-dark to-transparent">
<div class="flex items-center space-x-2">
<div class="w-8 h-8 bg-surface-dark rounded-lg flex items-center justify-center border border-gray-200 dark:border-gray-800">
<svg fill="none" height="18" viewBox="0 0 24 24" width="18" xmlns="http://www.w3.org/2000/svg">
<path d="M4 12H20M4 6H20M4 18H20" stroke="#D1F249" stroke-linecap="round" stroke-width="2.5"></path>
</svg>
</div>
<span class="font-bold text-lg tracking-tight">Glaido</span>
</div>
<div class="flex items-center space-x-4">
<span class="text-xs font-mono text-gray-500 dark:text-gray-400 border border-gray-200 dark:border-gray-800 rounded px-2 py-1">LIVE BETA</span>
<button class="text-gray-600 dark:text-gray-300 hover:text-primary transition-colors">
<span class="material-icons">settings</span>
</button>
</div>
</header>
<main class="flex-1 flex flex-col justify-between px-6 pb-8 relative">
<div class="flex justify-center mt-4">
<div class="inline-flex items-center space-x-2 bg-surface-light dark:bg-surface-dark border border-gray-200 dark:border-gray-800 rounded-full px-4 py-1.5 shadow-sm">
<span class="relative flex h-2.5 w-2.5">
<span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-primary opacity-75"></span>
<span class="relative inline-flex rounded-full h-2.5 w-2.5 bg-primary"></span>
</span>
<span class="text-xs font-medium text-gray-600 dark:text-gray-300 tracking-wide uppercase">Listening</span>
</div>
</div>
<div class="flex-1 flex flex-col items-center justify-center -mt-10">
<div class="relative w-48 h-48 flex items-center justify-center">
<div class="absolute inset-0 bg-primary/20 dark:bg-primary/10 rounded-full blur-2xl animate-pulse-slow"></div>
<div class="absolute inset-4 border border-primary/30 rounded-full animate-[spin_10s_linear_infinite]"></div>
<div class="absolute inset-8 border border-dashed border-primary/50 rounded-full animate-[spin_15s_linear_infinite_reverse]"></div>
<div class="relative w-24 h-24 bg-surface-dark rounded-2xl flex items-center justify-center border border-primary shadow-glow z-10">
<span class="material-icons text-primary text-5xl">graphic_eq</span>
</div>
</div>
<div class="h-12 flex items-center justify-center space-x-1 mt-8 w-full max-w-[200px]">
<div class="voice-bar h-4"></div>
<div class="voice-bar h-8"></div>
<div class="voice-bar h-6"></div>
<div class="voice-bar h-10"></div>
<div class="voice-bar h-5"></div>
<div class="voice-bar h-8"></div>
<div class="voice-bar h-4"></div>
<div class="voice-bar h-7"></div>
</div>
</div>
<div class="w-full max-w-md mx-auto space-y-4 mb-24 z-10">
<div class="bg-surface-light dark:bg-surface-dark/50 backdrop-blur-md rounded-2xl p-4 border border-gray-200 dark:border-gray-800 opacity-60 transform scale-95 origin-bottom">
<div class="flex items-center space-x-2 mb-2">
<img alt="User Avatar" class="w-6 h-6 rounded-full border border-gray-600" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAs-fkOvwf_erXZcqSRlFEtqN-RThlRbuS4KRL3OJlypT8cvP_ENse07twXN9a0FA4o14j9miNLFOZAe-qdBDXqLTV-zQefi1liAhm9k_WRiCJ9nTgUGhON4kHg-SibnGovhxTGrJm6fXV4Bwyn9Vg93liZ7Jvs6zqAe68bXiTet7XdsTix9k8KEn0HXxAWK8d9F2S58sRv82yNuHXxNcFSrNeYZqMkPYDI8CEm3uJVgiGmmZPZSCmo_zhvcH-86wdrLyoYqfJmqQ"/>
<span class="text-[10px] uppercase tracking-wider text-gray-500 font-semibold">Raw Input</span>
</div>
<p class="text-sm text-gray-500 dark:text-gray-400 italic">"Um, can you like send me that file when you get a chance maybe?"</p>
</div>
<div class="bg-surface-light dark:bg-surface-dark rounded-2xl p-5 border border-primary/40 shadow-lg relative overflow-hidden group">
<div class="absolute top-0 right-0 w-16 h-16 bg-primary/10 rounded-bl-full -mr-8 -mt-8"></div>
<div class="flex justify-between items-start mb-3">
<div class="flex items-center space-x-2">
<div class="w-5 h-5 bg-primary rounded-md flex items-center justify-center">
<span class="material-icons text-black text-[14px]">auto_awesome</span>
</div>
<span class="text-[10px] uppercase tracking-wider text-primary font-bold">Glaido Writes</span>
</div>
<button class="text-gray-400 hover:text-white transition-colors">
<span class="material-icons text-sm">content_copy</span>
</button>
</div>
<p class="text-lg font-medium leading-relaxed text-gray-800 dark:text-gray-100">
                    "Can you send me that file when you get a chance?"
                </p>
</div>
</div>
<div class="fixed bottom-0 left-0 right-0 p-6 bg-gradient-to-t from-background-light dark:from-background-dark via-background-light dark:via-background-dark to-transparent h-32 flex justify-center items-end z-20">
<div class="flex items-center space-x-8 mb-2">
<button class="p-3 rounded-full bg-surface-light dark:bg-surface-dark border border-gray-200 dark:border-gray-700 text-gray-500 dark:text-gray-400 hover:text-primary hover:border-primary transition-all duration-300">
<span class="material-icons">keyboard</span>
</button>
<button class="relative group">
<div class="absolute inset-0 bg-primary rounded-full blur opacity-40 group-hover:opacity-60 transition-opacity duration-300 animate-pulse"></div>
<div class="relative w-20 h-20 bg-primary rounded-full flex items-center justify-center shadow-glow-intense transform group-hover:scale-105 transition-transform duration-300 cursor-pointer">
<span class="material-icons text-background-dark text-4xl">stop</span>
</div>
</button>
<button class="p-3 rounded-full bg-surface-light dark:bg-surface-dark border border-gray-200 dark:border-gray-700 text-gray-500 dark:text-gray-400 hover:text-primary hover:border-primary transition-all duration-300">
<span class="material-icons">history</span>
</button>
</div>
</div>
</main>
<div class="fixed top-1/4 -left-20 w-64 h-64 bg-primary/5 rounded-full blur-3xl pointer-events-none"></div>
<div class="fixed bottom-1/4 -right-20 w-80 h-80 bg-primary/5 rounded-full blur-3xl pointer-events-none"></div>
<script>
        if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
            document.documentElement.classList.add('dark');
        } else {
            // Force dark mode for this specific design request as it looks better
             document.documentElement.classList.add('dark');
        }
    </script>

</body></html>
